<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* 検索エリアを最上部に固定 */
        .header { position: sticky; top: 0; background: var(--black); z-index: 100; padding-bottom: 10px; border-bottom: 1px solid #333; }
        #search-input { background: none; border: none; border-bottom: 2px solid var(--pink); font-size: 1.5rem; color: white; width: 100%; padding: 15px 0; outline: none; }
        
        /* プレイヤーエリア */
        #video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; margin: 15px 0; border: 1px solid #444; }
        #player { width: 100%; height: 100%; }

        /* リスト表示 */
        .row { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .title { flex-grow: 1; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; color: #eee; }
        .select-btn { color: var(--pink); border: 1px solid var(--pink); padding: 5px 15px; font-size: 0.8rem; font-weight: bold; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="search-input" placeholder="SEARCH..." onkeydown="if(event.key==='Enter') doSearch()">
        <div id="status" style="font-size:0.7rem; color:#666; margin-top:5px;">READY.</div>
    </div>

    <div id="video-container">
        <div id="player"></div>
    </div>

    <div id="lst"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // あなたのAPIキー
        const API_KEY = 'AIzaSyDo7AbKjXqTdV2CFkasBXFu__dzjE4Srak'; 
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0 }
            });
        }

        async function doSearch() {
            const q = document.getElementById('search-input').value;
            const status = document.getElementById('status');
            const lst = document.getElementById('lst');
            if (!q) return;

            status.innerText = "CONNECTING...";
            // YouTube Data API v3 を使用して検索
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&videoCategoryId=10&maxResults=20&key=${API_KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.items) {
                    status.innerText = `LST COUNT: ${data.items.length}`;
                    // 各動画のIDを playVideo 関数に渡すように生成
                    lst.innerHTML = data.items.map(i => `
                        <div class="row" onclick="playVideo('${i.id.videoId}')">
                            <div class="title">${i.snippet.title}</div>
                            <div class="select-btn">選 曲</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                status.innerText = "SEARCH ERROR.";
            }
        }

        // リストをタップした時に動画を読み込む
        function playVideo(id) {
            if (player && player.loadVideoById) {
                player.loadVideoById(id);
                // 入力欄からフォーカスを外す（キーボードを閉じる）
                document.getElementById('search-input').blur(); 
            }
        }
    </script>
</body>
</html>
