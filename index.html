<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; --gray: #1a1a1a; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 画面上部を完全に固定するエリア */
        .fixed-top {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--black); z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        /* プレイヤー：高さを少し抑えてスマホでの視認性を確保 */
        #video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border-bottom: 1px solid #333; }
        #player { width: 100%; height: 100%; }

        /* 検索バー：プレイヤーのすぐ下に固定 */
        .search-bar { padding: 10px 15px; background: var(--black); border-bottom: 1px solid #222; }
        #search-input { 
            background: var(--gray); border: 1px solid #333; border-radius: 4px;
            font-size: 1.2rem; color: white; width: 100%; padding: 12px; outline: none; box-sizing: border-box;
        }
        #search-input:focus { border-color: var(--pink); background: #000; }
        
        #status { font-size: 0.6rem; color: #666; margin-top: 5px; height: 1em; text-transform: uppercase; letter-spacing: 1px; }
        #back-btn { display: none; color: var(--pink); font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* リスト：固定エリアの高さ分だけ下に余白を作る */
        #lst { 
            margin-top: calc(100vw * 9 / 16 + 85px); /* プレイヤー＋検索窓の高さ */
            padding: 0 15px 100px 15px; 
        }

        .section-label { font-size: 0.7rem; color: var(--pink); font-weight: bold; margin: 20px 0 10px; border-left: 3px solid var(--pink); padding-left: 8px; letter-spacing: 2px; }
        .row { display: flex; align-items: center; padding: 18px 0; border-bottom: 1px solid #111; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .row:active { background: #111; }
        .title { flex-grow: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; color: #eee; }
        .type-tag { font-size: 0.6rem; padding: 2px 5px; background: #333; color: #aaa; margin-right: 10px; border-radius: 2px; flex-shrink: 0; }
        .select-btn { color: var(--pink); border: 1px solid var(--pink); padding: 6px 14px; font-size: 0.75rem; font-weight: bold; border-radius: 2px; flex-shrink: 0; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="fixed-top">
        <div id="video-container"><div id="player"></div></div>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="ARTIST / ALBUM / SONG..." onkeydown="if(event.key==='Enter') doSearch()">
            <div id="status">READY</div>
            <div id="back-btn" onclick="restoreLastSearch()">← BACK TO RESULTS</div>
        </div>
    </div>

    <div id="lst"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_KEY = 'AIzaSyDo7AbKjXqTdV2CFkasBXFu__dzjE4Srak'; 
        let player, lastResultsHTML = "";

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0, 'origin': location.origin }
            });
        }

        async function doSearch() {
            const q = document.getElementById('search-input').value;
            if (!q) return;
            
            document.getElementById('status').innerText = "SEARCHING...";
            document.getElementById('back-btn').style.display = "none";

            try {
                // Topic検索を自動付与
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " Topic")}&maxResults=40&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                renderList(data.items);
                lastResultsHTML = document.getElementById('lst').innerHTML;
                window.scrollTo(0, 0); // 検索時に一番上に戻す
            } catch (e) { document.getElementById('status').innerText = "ERROR."; }
        }

        function renderList(items) {
            const lst = document.getElementById('lst');
            let html = "";

            const playlists = items.filter(i => i.id.kind === 'youtube#playlist');
            if (playlists.length > 0) {
                html += '<div class="section-label">ALBUMS</div>';
                html += playlists.map(i => `
                    <div class="row" onclick="loadAlbum('${i.id.playlistId}', '${i.snippet.title}')">
                        <span class="type-tag">ALBUM</span>
                        <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                        <div class="select-btn">OPEN</div>
                    </div>
                `).join('');
            }

            const videos = items.filter(i => i.id.kind === 'youtube#video');
            if (videos.length > 0) {
                html += '<div class="section-label">SONGS</div>';
                html += videos.map(i => `
                    <div class="row" onclick="playVideo('${i.id.videoId}')">
                        <span class="type-tag">SONG</span>
                        <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                        <div class="select-btn">選 曲</div>
                    </div>
                `).join('');
            }
            lst.innerHTML = html;
        }

        async function loadAlbum(playlistId, title) {
            document.getElementById('status').innerText = "OPENING ALBUM...";
            try {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                let html = `<div class="section-label">${title.replace(/ - Topic$/, "")} - TRACKS</div>`;
                html += data.items.map(i => `
                    <div class="row" onclick="playVideo('${i.snippet.resourceId.videoId}')">
                        <div class="title">${i.snippet.title}</div>
                        <div class="select-btn">選 曲</div>
                    </div>
                `).join('');
                
                document.getElementById('lst').innerHTML = html;
                document.getElementById('back-btn').style.display = "block";
                window.scrollTo(0, 0);
            } catch (e) { document.getElementById('status').innerText = "ALBUM ERROR."; }
        }

        function restoreLastSearch() {
            document.getElementById('lst').innerHTML = lastResultsHTML;
            document.getElementById('back-btn').style.display = "none";
            document.getElementById('status').innerText = "RESULTS RESTORED";
            window.scrollTo(0, 0);
        }

        function playVideo(id) {
            if (player && player.loadVideoById) {
                player.loadVideoById({ videoId: id, suggestedQuality: 'highres' });
                document.getElementById('search-input').blur();
            }
        }
    </script>
</body>
</html>
