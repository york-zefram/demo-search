<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST - MUSIC MODE</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        
        .header { position: sticky; top: 0; background: var(--black); z-index: 1000; padding-bottom: 10px; border-bottom: 1px solid #333; }
        #search-input { background: none; border: none; border-bottom: 2px solid var(--pink); font-size: 1.5rem; color: white; width: 100%; padding: 15px 0; outline: none; }
        
        #video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; margin: 15px 0; border: 1px solid #444; }
        #player { width: 100%; height: 100%; }

        .row { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .title { flex-grow: 1; font-size: 0.85rem; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; }
        .select-btn { color: var(--pink); border: 1px solid var(--pink); padding: 5px 15px; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; flex-shrink: 0; }
        
        #status { font-size: 0.7rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="search-input" placeholder="SONG SEARCH..." onkeydown="if(event.key==='Enter') doSearch()">
        <div id="status">MUSIC READY.</div>
    </div>

    <div id="video-container">
        <div id="player"></div>
    </div>

    <div id="lst"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_KEY = 'AIzaSyDo7AbKjXqTdV2CFkasBXFu__dzjE4Srak'; 
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0 }
            });
        }

        async function doSearch() {
            const q = document.getElementById('search-input').value;
            if (!q) return;
            
            document.getElementById('status').innerText = "FILTERING SONGS...";

            // YouTube Musicの「癖」： "Topic" を加えると公式音源がヒットしやすくなる
            // さらに "Official Audio" を加えることでMVを排除
            const musicQuery = encodeURIComponent(q + " Topic Official Audio");
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${musicQuery}&type=video&videoCategoryId=10&maxResults=25&key=${API_KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById('lst').innerHTML = (data.items || []).map(i => `
                    <div class="row" onclick="playVideo('${i.id.videoId}')">
                        <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                        <div class="select-btn">選 曲</div>
                    </div>
                `).join('');
                document.getElementById('status').innerText = `SONG LST: ${data.items.length}`;
            } catch (e) { document.getElementById('status').innerText = "ERROR."; }
        }

        function playVideo(id) {
            if (player && player.loadVideoById) {
                // YouTube Musicに近い挙動にするため、余計なパラメータを排除して再生
                player.loadVideoById({
                    videoId: id,
                    suggestedQuality: 'highres'
                });
                document.getElementById('search-input').blur();
            }
        }
    </script>
</body>
</html>
