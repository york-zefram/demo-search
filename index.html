<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST - EMERGENCY FIX</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* 検索窓：装飾を削ぎ落とし、確実に表示させる */
        .search-area { margin-bottom: 20px; border-bottom: 2px solid var(--pink); padding-bottom: 10px; }
        #search-input { 
            background: #111; border: 1px solid #333; font-size: 1.5rem; 
            color: white; width: 100%; padding: 15px; outline: none; box-sizing: border-box;
        }
        #status { font-size: 0.7rem; color: #666; margin-top: 5px; }
        #back-btn { display: none; color: var(--pink); cursor: pointer; margin-top: 5px; font-size: 0.8rem; }

        /* リストエリア */
        #lst { min-height: 100px; margin-bottom: 20px; }
        .row { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .title { flex-grow: 1; font-size: 0.9rem; color: #eee; }
        .select-btn { color: var(--pink); border: 1px solid var(--pink); padding: 5px 15px; font-size: 0.8rem; font-weight: bold; flex-shrink: 0; }

        /* プレイヤー：一番下に配置して、上の描画を邪魔させない */
        #video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border: 1px solid #333; margin-top: 20px; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="search-area">
        <input type="text" id="search-input" placeholder="SEARCH ARTIST..." onkeydown="if(event.key==='Enter') doSearch()">
        <div id="status">READY</div>
        <div id="back-btn" onclick="restoreLastSearch()">← BACK</div>
    </div>

    <div id="lst"></div>

    <div id="video-container">
        <div id="player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_KEY = 'AIzaSyDo7AbKjXqTdV2CFkasBXFu__dzjE4Srak'; 
        let player, lastResultsHTML = "";

        function onYouTubeIframeAPIReady() {
            try {
                player = new YT.Player('player', {
                    height: '100%', width: '100%', videoId: '',
                    playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0 }
                });
            } catch(e) { console.error("Player Load Error"); }
        }

        async function doSearch() {
            const q = document.getElementById('search-input').value;
            if (!q) return;
            document.getElementById('status').innerText = "CONNECTING...";

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " Topic")}&maxResults=30&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                let html = "";
                // アルバムと動画をシンプルに並べる
                (data.items || []).forEach(i => {
                    const isPlaylist = i.id.kind === 'youtube#playlist';
                    const id = isPlaylist ? i.id.playlistId : i.id.videoId;
                    const action = isPlaylist ? `loadAlbum('${id}')` : `playVideo('${id}')`;
                    const label = isPlaylist ? 'ALBUM' : '選 曲';
                    
                    html += `<div class="row" onclick="${action}">
                                <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                                <div class="select-btn">${label}</div>
                             </div>`;
                });
                document.getElementById('lst').innerHTML = html;
                lastResultsHTML = html;
                document.getElementById('status').innerText = "DONE";
            } catch (e) { document.getElementById('status').innerText = "API ERROR"; }
        }

        async function loadAlbum(playlistId) {
            document.getElementById('status').innerText = "LOADING ALBUM...";
            try {
                const url = `https://www.googleapis.com/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                let html = (data.items || []).map(i => `
                    <div class="row" onclick="playVideo('${i.snippet.resourceId.videoId}')">
                        <div class="title">${i.snippet.title}</div>
                        <div class="select-btn">選 曲</div>
                    </div>
                `).join('');
                document.getElementById('lst').innerHTML = html;
                document.getElementById('back-btn').style.display = "block";
            } catch (e) { }
        }

        function restoreLastSearch() {
            document.getElementById('lst').innerHTML = lastResultsHTML;
            document.getElementById('back-btn').style.display = "none";
        }

        function playVideo(id) {
            if (player && player.loadVideoById) {
                player.loadVideoById(id);
                document.getElementById('search-input').blur();
                // 再生時にプレイヤーまで自動スクロール
                document.getElementById('video-container').scrollIntoView({behavior: "smooth"});
            }
        }
    </script>
</body>
</html>
