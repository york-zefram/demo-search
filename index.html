<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; --gray: #1a1a1a; }
        
        html, body { height: 100%; margin: 0; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; }

        #video-container { width: 100%; aspect-ratio: 16 / 9; max-height: 35vh; background: #000; flex-shrink: 0; border-bottom: 1px solid #333; }
        #player { width: 100%; height: 100%; }

        .search-bar { padding: 10px 15px; background: var(--black); flex-shrink: 0; border-bottom: 1px solid #222; }
        #search-input { 
            background: var(--gray); border: 1px solid #333; border-radius: 4px;
            font-size: 1.1rem; color: white; width: 100%; padding: 10px; outline: none; box-sizing: border-box;
        }
        #status { font-size: 0.6rem; color: #666; margin-top: 5px; text-transform: uppercase; }
        #back-btn { display: none; color: var(--pink); font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-top: 5px; }

        #lst { flex-grow: 1; overflow-y: auto; padding: 0 15px 50px 15px; -webkit-overflow-scrolling: touch; }

        .section-label { font-size: 0.7rem; color: var(--pink); font-weight: bold; margin: 20px 0 10px; border-left: 3px solid var(--pink); padding-left: 8px; letter-spacing: 2px; }
        
        .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; cursor: pointer; }
        
        /* サムネイル枠：ここを基準に中身を切り抜く */
        .thumb-box { 
            width: 50px; 
            height: 50px; 
            flex-shrink: 0; 
            margin-right: 12px; 
            overflow: hidden; /* 枠からはみ出た部分（黒帯）を隠す */
            border-radius: 2px; 
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 【解決策】
           YouTubeサムネイル特有の左右の黒帯をカットするため、
           画像を横に1.35倍（135%）ほど拡大し、上下左右を中央で固定。
           これで黒帯だけが枠の外に追い出されます。
        */
        .thumb-box img { 
            width: 135%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            flex-shrink: 0;
        }

        .title { flex-grow: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; color: #eee; }
        .type-tag { font-size: 0.6rem; padding: 2px 4px; background: #333; color: #aaa; margin-right: 8px; border-radius: 2px; flex-shrink: 0; }
        .select-btn { color: var(--pink); border: 1px solid var(--pink); padding: 4px 12px; font-size: 0.7rem; font-weight: bold; border-radius: 2px; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="video-container"><div id="player"></div></div>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="SEARCH..." onkeydown="if(event.key==='Enter') doSearch()">
            <div id="status">READY</div>
            <div id="back-btn" onclick="restoreLastSearch()">← BACK</div>
        </div>

        <div id="lst"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_KEY = 'AIzaSyDo7AbKjXqTdV2CFkasBXFu__dzjE4Srak'; 
        let player, lastResultsHTML = "";

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0, 'origin': location.origin }
            });
        }

        async function doSearch() {
            const q = document.getElementById('search-input').value;
            if (!q) return;
            document.getElementById('status').innerText = "SEARCHING...";
            document.getElementById('back-btn').style.display = "none";

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " Topic")}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                renderList(data.items);
                lastResultsHTML = document.getElementById('lst').innerHTML;
                document.getElementById('lst').scrollTop = 0;
            } catch (e) { document.getElementById('status').innerText = "ERROR."; }
        }

        function renderList(items) {
            const lst = document.getElementById('lst');
            let html = "";
            
            const playlists = items.filter(i => i.id.kind === 'youtube#playlist');
            if (playlists.length > 0) {
                html += '<div class="section-label">ALBUMS</div>';
                html += playlists.map(i => {
                    const thumb = i.snippet.thumbnails.default.url;
                    return `<div class="row" onclick="loadAlbum('${i.id.playlistId}', '${i.snippet.title}')">
                        <div class="thumb-box"><img src="${thumb}"></div>
                        <span class="type-tag">ALBUM</span>
                        <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                        <div class="select-btn">OPEN</div>
                    </div>`;
                }).join('');
            }
            
            const videos = items.filter(i => i.id.kind === 'youtube#video');
            if (videos.length > 0) {
                html += '<div class="section-label">SONGS</div>';
                html += videos.map(i => {
                    const thumb = i.snippet.thumbnails.default.url;
                    return `<div class="row" onclick="playVideo('${i.id.videoId}')">
                        <div class="thumb-box"><img src="${thumb}"></div>
                        <span class="type-tag">SONG</span>
                        <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                        <div class="select-btn">選 曲</div>
                    </div>`;
                }).join('');
            }
            lst.innerHTML = html;
        }

        async function loadAlbum(playlistId, title) {
            document.getElementById('status').innerText = "OPENING ALBUM...";
            try {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                let html = `<div class="section-label">${title.replace(/ - Topic$/, "")}</div>`;
                html += data.items.map(i => {
                    const thumb = i.snippet.thumbnails.default.url;
                    return `<div class="row" onclick="playVideo('${i.snippet.resourceId.videoId}')">
                        <div class="thumb-box"><img src="${thumb}"></div>
                        <div class="title">${i.snippet.title}</div>
                        <div class="select-btn">選 曲</div>
                    </div>`;
                }).join('');
                document.getElementById('lst').innerHTML = html;
                document.getElementById('back-btn').style.display = "block";
                document.getElementById('lst').scrollTop = 0;
            } catch (e) { document.getElementById('status').innerText = "ERROR."; }
        }

        function restoreLastSearch() {
            document.getElementById('lst').innerHTML = lastResultsHTML;
            document.getElementById('back-btn').style.display = "none";
            document.getElementById('lst').scrollTop = 0;
        }

        function playVideo(id) {
            if (player && player.loadVideoById) {
                player.loadVideoById({ videoId: id, suggestedQuality: 'highres' });
                document.getElementById('search-input').blur();
            }
        }
    </script>
</body>
</html>
