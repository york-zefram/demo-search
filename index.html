<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* 1. プレイヤー固定エリア */
        #video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; margin-bottom: 15px; border: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        #player { width: 100%; height: 100%; }

        /* 2. 検索インターフェース */
        .search-box { position: relative; margin-bottom: 10px; }
        #search-input { background: none; border: none; border-bottom: 2px solid #444; font-size: 1.5rem; color: white; width: 100%; padding: 10px 0; outline: none; border-radius: 0; }
        #search-input:focus { border-bottom-color: var(--pink); }
        #status { font-size: 0.7rem; color: #666; margin-bottom: 15px; height: 1em; }

        /* 3. 選曲リスト（Topic強化仕様） */
        .row { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .row:active { background: #111; }
        .title { flex-grow: 1; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; color: #eee; }
        .select-btn { color: var(--pink); border: 1px solid var(--pink); padding: 5px 15px; font-size: 0.8rem; font-weight: bold; border-radius: 2px; flex-shrink: 0; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="video-container">
        <div id="player"></div>
    </div>
    
    <div class="search-box">
        <input type="text" id="search-input" placeholder="SEARCH MUSIC..." onkeydown="if(event.key==='Enter') doSearch()">
        <div id="status">READY.</div>
    </div>

    <div id="lst"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // APIキー（保存された情報に基づき入力済み）
        const API_KEY = 'AIzaSyDo7AbKjXqTdV2CFkasBXFu__dzjE4Srak'; 

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 
                    'playsinline': 1, 
                    'controls': 1, 
                    'rel': 0,
                    'origin': location.origin
                }
            });
        }

        async function doSearch() {
            const q = document.getElementById('search-input').value;
            const status = document.getElementById('status');
            const lst = document.getElementById('lst');
            
            if (!q) return;
            status.innerText = "FILTERING TOPIC SONGS...";

            // 【Topic強化ロジック】
            // クエリに "Topic" を付加し、カテゴリ10(Music)で検索。さらに埋め込み可能なものに限定
            const query = encodeURIComponent(q + " Topic");
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&videoCategoryId=10&videoEmbeddable=true&maxResults=30&key=${API_KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.error) {
                    status.innerHTML = `<span style="color:var(--pink)">ERROR: ${data.error.message}</span>`;
                    return;
                }

                status.innerText = `MUSIC LST: ${data.items.length}`;
                
                // リスト生成（タイトルから不要な "- Topic" を除去してスッキリさせる）
                lst.innerHTML = (data.items || []).map(i => {
                    const cleanTitle = i.snippet.title.replace(/\s*-\s*Topic/gi, '');
                    return `
                        <div class="row" onclick="playVideo('${i.id.videoId}')">
                            <div class="title">${cleanTitle}</div>
                            <div class="select-btn">選 曲</div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                status.innerText = "OFFLINE.";
            }
        }

        function playVideo(id) {
            if (player && player.loadVideoById) {
                player.loadVideoById({
                    videoId: id,
                    suggestedQuality: 'highres'
                });
                document.getElementById('search-input').blur(); // キーボードを閉じる
            }
        }
    </script>
</body>
</html>
